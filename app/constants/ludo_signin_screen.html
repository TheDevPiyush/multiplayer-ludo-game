
<style>
  @keyframes floatA { 0%,100%{transform:translateY(0) rotate(0deg) scale(1)} 50%{transform:translateY(-10px) rotate(6deg) scale(1.05)} }
  @keyframes floatB { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-7px) rotate(-5deg)} }
  @keyframes floatC { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-12px) scale(1.08)} }
  @keyframes floatD { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(4deg)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shimmer { 0%{opacity:0.04} 50%{opacity:0.09} 100%{opacity:0.04} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

  .fa{animation:floatA 3.4s ease-in-out infinite;}
  .fb{animation:floatB 4s ease-in-out infinite 0.6s;}
  .fc{animation:floatC 3.8s ease-in-out infinite 1.1s;}
  .fd{animation:floatD 3.2s ease-in-out infinite 0.3s;}
  .fu1{animation:fadeUp 0.5s ease both 0.1s;}
  .fu2{animation:fadeUp 0.5s ease both 0.25s;}
  .fu3{animation:fadeUp 0.5s ease both 0.4s;}
  .fu4{animation:fadeUp 0.5s ease both 0.55s;}
  .fu5{animation:fadeUp 0.5s ease both 0.7s;}
  .grid-shimmer{animation:shimmer 4s ease-in-out infinite;}
  .dice-pulse{animation:pulse 2.5s ease-in-out infinite;}

  .btn-google:hover{background:#f0f0f0 !important;}
  .btn-github:hover{background:#222235 !important;}
  .btn-google, .btn-github{transition:background 0.2s;}
</style>

<div style="display:flex;justify-content:center;align-items:flex-start;padding:1.5rem 1rem;min-height:100%;">

<div style="width:290px;background:#07070e;border-radius:40px;border:7px solid #131320;overflow:hidden;box-shadow:0 0 0 1px #1a1a2a;">

  <!-- Status bar -->
  <div style="background:#07070e;padding:10px 24px 5px;display:flex;justify-content:space-between;align-items:center;">
    <span style="color:#44445a;font-size:11px;font-family:monospace;font-weight:600;letter-spacing:0.5px;">9:41</span>
    <div style="display:flex;gap:3px;align-items:flex-end;">
      <div style="width:3px;height:5px;background:#2a2a40;border-radius:1px;"></div>
      <div style="width:3px;height:8px;background:#2a2a40;border-radius:1px;"></div>
      <div style="width:3px;height:11px;background:#44445a;border-radius:1px;"></div>
      <div style="width:3px;height:14px;background:#66667a;border-radius:1px;"></div>
    </div>
  </div>

  <!-- Hero section -->
  <div style="position:relative;height:290px;background:#07070e;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;">

    <!-- Subtle board grid texture -->
    <svg class="grid-shimmer" style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 276 290" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="g" width="19.5" height="19.5" patternUnits="userSpaceOnUse">
          <path d="M 19.5 0 L 0 0 0 19.5" fill="none" stroke="#fff" stroke-width="0.4"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#g)"/>
    </svg>

    <!-- Colored corner quadrant glows -->
    <div style="position:absolute;top:-20px;left:-20px;width:100px;height:100px;background:#D94444;border-radius:50%;opacity:0.07;filter:blur(20px);"></div>
    <div style="position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:#3B7DD8;border-radius:50%;opacity:0.07;filter:blur(20px);"></div>
    <div style="position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;background:#2DAA5C;border-radius:50%;opacity:0.07;filter:blur(20px);"></div>
    <div style="position:absolute;bottom:-20px;right:-20px;width:100px;height:100px;background:#E8A520;border-radius:50%;opacity:0.07;filter:blur(20px);"></div>

    <!-- Corner triangular color accents -->
    <div style="position:absolute;top:0;left:0;width:0;height:0;border-style:solid;border-width:56px 56px 0 0;border-color:#D94444 transparent transparent transparent;opacity:0.18;"></div>
    <div style="position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 56px 56px 0;border-color:transparent #3B7DD8 transparent transparent;opacity:0.18;"></div>
    <div style="position:absolute;bottom:0;left:0;width:0;height:0;border-style:solid;border-width:56px 0 0 56px;border-color:transparent transparent transparent #2DAA5C;opacity:0.18;"></div>
    <div style="position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 56px 56px;border-color:transparent transparent #E8A520 transparent;opacity:0.18;"></div>

    <!-- Floating tokens -->
    <div class="fa" style="position:absolute;top:38px;left:36px;width:24px;height:24px;border-radius:50%;background:#D94444;border:3px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;">
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
    </div>
    <div class="fb" style="position:absolute;top:50px;right:44px;width:19px;height:19px;border-radius:50%;background:#3B7DD8;border:2.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;">
      <div style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.22);"></div>
    </div>
    <div class="fc" style="position:absolute;bottom:55px;left:48px;width:21px;height:21px;border-radius:50%;background:#2DAA5C;border:2.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;">
      <div style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.22);"></div>
    </div>
    <div class="fd" style="position:absolute;bottom:44px;right:38px;width:26px;height:26px;border-radius:50%;background:#E8A520;border:3px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;">
      <div style="width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.25);"></div>
    </div>

    <!-- Center content -->
    <div style="z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;">

      <!-- Dice -->
      <div class="dice-pulse fu1" style="margin-bottom:14px;">
        <svg width="46" height="46" viewBox="0 0 46 46">
          <rect x="2" y="2" width="42" height="42" rx="10" fill="#13132a" stroke="#252545" stroke-width="1.5"/>
          <rect x="4" y="4" width="38" height="38" rx="8" fill="none" stroke="#1e1e38" stroke-width="1"/>
          <!-- 5 dots in Ludo colors -->
          <circle cx="13" cy="13" r="4" fill="#D94444"/>
          <circle cx="33" cy="13" r="4" fill="#3B7DD8"/>
          <circle cx="23" cy="23" r="4" fill="#fff" opacity="0.7"/>
          <circle cx="13" cy="33" r="4" fill="#2DAA5C"/>
          <circle cx="33" cy="33" r="4" fill="#E8A520"/>
        </svg>
      </div>

      <div class="fu2" style="font-size:50px;font-weight:700;letter-spacing:10px;color:#fff;font-family:Georgia,serif;line-height:1;text-shadow:0 0 40px rgba(255,255,255,0.08);">LUDO</div>

      <div class="fu3" style="margin-top:7px;display:flex;align-items:center;gap:6px;">
        <div style="width:18px;height:0.5px;background:#252538;"></div>
        <span style="font-size:9px;letter-spacing:2.5px;color:#2a2a42;font-weight:600;text-transform:uppercase;">Play with your squad</span>
        <div style="width:18px;height:0.5px;background:#252538;"></div>
      </div>
    </div>
  </div>

  <!-- Feature pills -->
  <div class="fu4" style="background:#07070e;padding:13px 20px;display:flex;justify-content:center;gap:7px;border-top:0.5px solid #0e0e1c;border-bottom:0.5px solid #0e0e1c;">
    <div style="background:#111122;border:0.5px solid #1e1e32;border-radius:20px;padding:5px 10px;display:flex;align-items:center;gap:5px;">
      <svg width="8" height="8" viewBox="0 0 16 16" fill="none"><rect x="5" y="1" width="6" height="9" rx="3" fill="#2DAA5C"/></svg>
      <span style="color:#66667a;font-size:9.5px;font-weight:600;letter-spacing:0.3px;">Voice Chat</span>
    </div>
    <div style="background:#111122;border:0.5px solid #1e1e32;border-radius:20px;padding:5px 10px;display:flex;align-items:center;gap:5px;">
      <div style="width:6px;height:6px;border-radius:50%;background:#3B7DD8;"></div>
      <span style="color:#66667a;font-size:9.5px;font-weight:600;letter-spacing:0.3px;">4 Players</span>
    </div>
    <div style="background:#111122;border:0.5px solid #1e1e32;border-radius:20px;padding:5px 10px;display:flex;align-items:center;gap:5px;">
      <div style="width:6px;height:6px;border-radius:50%;background:#E8A520;"></div>
      <span style="color:#66667a;font-size:9.5px;font-weight:600;letter-spacing:0.3px;">Real-time</span>
    </div>
  </div>

  <!-- Sign-in section -->
  <div class="fu5" style="background:#0b0b17;padding:24px 22px 26px;">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:17px;font-weight:700;color:#e8e8f0;font-family:Georgia,serif;margin-bottom:5px;">Welcome back</div>
      <div style="font-size:11px;color:#2e2e48;font-weight:500;">Sign in to start playing</div>
    </div>

    <!-- Google button -->
    <button class="btn-google" style="width:100%;background:#ffffff;border:none;border-radius:14px;padding:13px 16px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;margin-bottom:10px;">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span style="font-size:13.5px;font-weight:700;color:#1a1a28;letter-spacing:0.2px;">Continue with Google</span>
    </button>

    <!-- GitHub button -->
    <button class="btn-github" style="width:100%;background:#13132a;border:1.5px solid #1e1e38;border-radius:14px;padding:13px 16px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;margin-bottom:22px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#c0c0d8">
        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
      <span style="font-size:13.5px;font-weight:700;color:#a0a0c0;letter-spacing:0.2px;">Continue with GitHub</span>
    </button>

    <!-- Divider with OR -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;margin-top:-12px;">
      <div style="flex:1;height:0.5px;background:#131325;"></div>
      <span style="font-size:9px;color:#1e1e32;font-weight:600;letter-spacing:1px;">SECURE SIGN IN</span>
      <div style="flex:1;height:0.5px;background:#131325;"></div>
    </div>

    <!-- Trust badges -->
    <div style="display:flex;justify-content:center;gap:16px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:4px;">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 1L2 3v3c0 2.2 1.7 4.2 4 4.9C8.3 10.2 10 8.2 10 6V3L6 1z" fill="#2DAA5C" opacity="0.7"/></svg>
        <span style="font-size:9px;color:#252538;font-weight:500;">Encrypted</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#3B7DD8" stroke-width="1.2" opacity="0.7"/><path d="M4 6l1.5 1.5L8 4" stroke="#3B7DD8" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/></svg>
        <span style="font-size:9px;color:#252538;font-weight:500;">No Password</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="4" r="2.5" stroke="#E8A520" stroke-width="1.2" opacity="0.7"/><path d="M1.5 10.5c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="#E8A520" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/></svg>
        <span style="font-size:9px;color:#252538;font-weight:500;">Private</span>
      </div>
    </div>

    <div style="text-align:center;">
      <span style="font-size:9.5px;color:#1a1a2e;">By signing in, you agree to our </span>
      <span style="font-size:9.5px;color:#3B7DD8;cursor:pointer;">Terms</span>
      <span style="font-size:9.5px;color:#1a1a2e;"> & </span>
      <span style="font-size:9.5px;color:#3B7DD8;cursor:pointer;">Privacy Policy</span>
    </div>
  </div>

</div>
</div>
